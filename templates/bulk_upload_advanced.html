{% extends "base.html" %}

{% block content %}

<h2>Advanced Bulk Upload</h2>

<form method="POST" enctype="multipart/form-data">

    <label>Upload CSV</label>
    <input type="file" name="csv_file" class="form-control mb-3" required>

    <label>Upload Images</label>
    <input type="file" name="images" multiple class="form-control mb-3">

    <button class="btn btn-success">Upload All</button>

</form>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<h2>Add Product</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="text" name="name" placeholder="Product Name" class="form-control mb-3" required>

    <input type="number" step="0.01" name="price" placeholder="Price" class="form-control mb-3" required>

    <textarea name="description" placeholder="Description" class="form-control mb-3" required></textarea>

    <input type="file" name="image" class="form-control mb-3">

    <button class="btn btn-outline-light">Add Product</button>

</form>

{% endblock %}

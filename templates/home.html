{% extends "base.html" %}

{% block content %}

<h1>Products</h1>

<div class="products">
    {% for product in products %}
    
    <div class="card">
        <img src="{{ url_for('static', filename=product.image) }}">

        <div class="card-content">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p class="price">₹{{ product.price }}</p>

            <a href="{{ url_for('cart.add_to_cart', product_id=product.id) }}" class="btn">
                Add to Cart
            </a>
        </div>
    </div>

    {% endfor %}
</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETE Store</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="galaxy"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">ETE Store</a>

        <!-- SEARCH -->
         <form action="/" method="GET" class="search-box">
            <input type="text" name="search" placeholder="Search products..." />
            <button type="submit">Search</button>
        </form>

        <!-- LINKS -->
        <div>
            <a class="nav-link d-inline text-light" href="/">Home</a>
            <a class="nav-link d-inline text-light" href="/cart">Cart</a>
            <a class="nav-link d-inline text-light" href="/orders/history">Orders</a>
            <a class="nav-link d-inline text-light" href="/login">Login</a>
            <a class="nav-link d-inline text-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function(e) {
        let ripple = document.createElement("span");
        ripple.classList.add("ripple");

        let rect = card.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left) + "px";
        ripple.style.top = (e.clientY - rect.top) + "px";

        card.appendChild(ripple);

        setTimeout(() => ripple.remove(), 600);
    });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".card").forEach((card, i) => {
        card.style.opacity = 0;
        card.style.transform = "translateY(15px)";
        
        setTimeout(() => {
            card.style.transition = "all 0.4s ease";
            card.style.opacity = 1;
            card.style.transform = "translateY(0)";
        }, i * 80);
    });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const cards = document.querySelectorAll(".card");

    cards.forEach((card, index) => {
        setTimeout(() => {
            card.classList.add("show");
        }, index * 100); // stagger effect
    });
});
</script>

<style>
.ripple {
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(56,189,248,0.3);
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
}

@keyframes ripple {
    to {
        transform: scale(3);
        opacity: 0;
    }
}
</style>

</body>
</html>

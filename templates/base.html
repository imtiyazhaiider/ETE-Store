<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETE Store</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="galaxy"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container">

        {% if current_user.is_authenticated %}

<div class="account-menu">
    <div class="account-icon">
        <i class="fa fa-user"></i>
    </div>

    <div class="dropdown">
        <p>{{ current_user.username }}</p>
        <a href="/orders">Orders</a>
        <a href="/cart">Cart</a>
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    </div>
</div>

{% else %}

<a href="{{ url_for('auth.login') }}">Login</a>
<a href="{{ url_for('auth.register') }}">Register</a>

{% endif %}
        <a class="navbar-brand fw-bold" href="/">ETE Store</a>

        <!-- SEARCH -->
         <form action="/" method="GET" class="search-box">
    <div class="search-wrapper">
        <input type="text" name="search" placeholder="Search products..." />
        <button type="submit">Search</button>
    </div>
</form>

        <!-- LINKS -->
        <div>
            <a class="nav-link d-inline text-light" href="/">Home</a>
            <a class="nav-link d-inline text-light" href="/cart">Cart</a>
            <a class="nav-link d-inline text-light" href="/orders/history">Orders</a>
            <a class="nav-link d-inline text-light" href="/wishlist">Wishlist</a>
            <a class="nav-link d-inline text-light" href="/login">Login</a>
            <a class="nav-link d-inline text-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

<script>
document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function(e) {
        let ripple = document.createElement("span");
        ripple.classList.add("ripple");

        let rect = card.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left) + "px";
        ripple.style.top = (e.clientY - rect.top) + "px";

        card.appendChild(ripple);

        setTimeout(() => ripple.remove(), 600);
    });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".card").forEach((card, i) => {
        card.style.opacity = 0;
        card.style.transform = "translateY(15px)";
        
        setTimeout(() => {
            card.style.transition = "all 0.4s ease";
            card.style.opacity = 1;
            card.style.transform = "translateY(0)";
        }, i * 80);
    });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const cards = document.querySelectorAll(".card");

    cards.forEach((card, index) => {
        setTimeout(() => {
            card.classList.add("show");
        }, index * 100); // stagger effect
    });
});
</script>

<script>
const cards = document.querySelectorAll(".card");

cards.forEach(card => {
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = -(y - centerY) / 10;
        const rotateY = (x - centerX) / 10;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "rotateX(0) rotateY(0) scale(1)";
    });
});
</script>

<div class="cursor-glow"></div>

<script>
document.addEventListener("mousemove", (e) => {
    const glow = document.querySelector(".cursor-glow");
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

<style>
.ripple {
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(56,189,248,0.3);
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
}

@keyframes ripple {
    to {
        transform: scale(3);
        opacity: 0;
    }
}
</style>

<script>
function revealOnScroll() {
    const elements = document.querySelectorAll(".reveal");

    elements.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;

        if (elementTop < windowHeight - 100) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);
</script>


</body>
</html>

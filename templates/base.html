<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETE Store</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">ETE Store</a>

        <!-- SEARCH -->
        <form class="d-flex" action="/search" method="GET">
            <input class="form-control me-2 search-input" type="search" name="q" placeholder="Search products...">
            <button class="btn btn-outline-light">Search</button>
        </form>

        <!-- LINKS -->
        <div>
            <a class="nav-link d-inline text-light" href="/">Home</a>
            <a class="nav-link d-inline text-light" href="/cart">Cart</a>
            <a class="nav-link d-inline text-light" href="/orders/history">Orders</a>
            <a class="nav-link d-inline text-light" href="/login">Login</a>
            <a class="nav-link d-inline text-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

</body>
</html>
